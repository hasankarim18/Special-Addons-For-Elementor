<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Swiper demo</title>
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=1"
    />
    <!-- Link Swiper's CSS -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.css"
    />

    <!-- Demo styles -->
    <style>
      html,
      body {
        position: relative;
        height: 100%;
      }

      body {
        background: #000;
        font-family:
          Helvetica Neue,
          Helvetica,
          Arial,
          sans-serif;
        font-size: 14px;
        color: #fff;
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      .swiper {
        width: 100%;
        height: 500px;
      }

      .swiper-slide {
        text-align: center;
        box-sizing: border-box;
        font-size: 18px;
        background: #444;
        display: flex;
        padding: 30px;
        justify-content: center;
        align-items: center;
      }

      .safe_swiper_slide_innter {
        width: 100%;
        height: 100%;
        background-color: #fff;
      }

      .swiper-slide img {
        display: block;
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
    </style>
  </head>

  <body>
    <!-- Swiper -->
    <div class="swiper safe_pagination_fraction">
      <div class="swiper-wrapper">
        <div class="swiper-slide">
          <div class="safe_swiper_slide_innter">Slides inner</div>
        </div>
        <div class="swiper-slide">
          <div class="safe_swiper_slide_innter">Slides inner</div>
        </div>
        <div class="swiper-slide">
          <div class="safe_swiper_slide_innter">Slides inner</div>
        </div>
        <div class="swiper-slide">
          <div class="safe_swiper_slide_innter">Slides inner</div>
        </div>
        <div class="swiper-slide">
          <div class="safe_swiper_slide_innter">Slides inner</div>
        </div>
        <div class="swiper-slide">
          <div class="safe_swiper_slide_innter">Slides inner</div>
        </div>
        <div class="swiper-slide">
          <div class="safe_swiper_slide_innter">Slides inner</div>
        </div>
        <div class="swiper-slide">
          <div class="safe_swiper_slide_innter">Slides inner</div>
        </div>
        <div class="swiper-slide">
          <div class="safe_swiper_slide_innter">Slides inner</div>
        </div>
      </div>
      <div class="swiper-button-next"></div>
      <div class="swiper-button-prev"></div>
      <div class="swiper-pagination"></div>
    </div>

    <!-- Swiper JS -->
    <script src="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.js"></script>

    <!-- Initialize Swiper -->
    <script>
      var swiper = new Swiper(".safe_pagination_fraction", {
        pagination: {
          el: ".swiper-pagination",
          type: "fraction",
        },
        //  slidesPerView: 3,
        navigation: {
          nextEl: ".swiper-button-next",
          prevEl: ".swiper-button-prev",
        },
      });
    </script>
  </body>
</html>
